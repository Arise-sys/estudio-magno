        body { 
            margin: 0; 
            padding: 0; 
            background-color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-y: scroll; 
            overflow-x: hidden; 
            width: 100vw; 
            font-family: sans-serif;
            background-image: linear-gradient(rgba(230, 230, 230, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(230, 230, 230, 0.5) 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 25px; 
            background: white; 
            border-bottom: 2px solid #000; 
            z-index: 10; 
            font-family: var(--fuente-mono); 
        }

        .logo-link {
            text-decoration: none; /* Quita el subrayado */
            color: inherit;        /* Mantiene el color negro original */
            cursor: pointer;      /* Cambia el cursor a la "manito" al pasar el mouse */
        }

        .logo-link:hover {
        opacity: 0.7;          /* Un pequeño efecto visual al tocarlo */
        }

        /* Nueva Marquesina Profesional */
        .contenedor-bucle { 
            --gap: 3rem; 
            width: 100%; 
            background: #000; 
            overflow: hidden; 
            padding: 10px 0; 
            display: flex; 
            user-select: none;
            gap: var(--gap);
        }

        .texto-movil { 
            flex-shrink: 0;
            display: flex; 
            justify-content: flex-start;
            min-width: 100%;
            gap: var(--gap);
            animation: desplaza 30s linear infinite; 
            font-family: var(--fuente-mono); 
            color: #fff; 
            text-transform: uppercase; 
            white-space: nowrap; 
        }

        @keyframes desplaza { 
            from { transform: translateX(0); } 
            to { transform: translateX(calc(-100% - var(--gap))); } 
        }

        @media (prefers-reduced-motion: reduce) {
            .texto-movil { animation-play-state: paused; }
        }

        nav { display: flex; justify-content: center; background: none; }
        
        .tab-btn { 
            padding: 15px 30px; 
            border: none; 
            background: none; 
            cursor: pointer; 
            font-family: var(--fuente-mono); 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        
        .tab-btn:hover { background: #e0e0e0; }
        .tab-btn.active { background: #000; color: #fff; }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
            padding-bottom: 50px;
        }

        .seccion { 
            display: none; 
            width: 100%; 
            justify-content: center; 
        }

        .seccion.active { display: flex; }

        .panel { 
            background: #fff;

            border: 2px solid #000;

        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        select, input[type="number"] { width: 100%; padding: 8px; border: 2px solid #000; box-sizing: border-box; font-family: var(--fuente-mono); height: 42px; }
        
        .contenedor-nombre-pdf {

<script>
    const DPI = 600;
    const F = DPI / 2.54;
    document.getElementById('fecha').textContent = new Date().toLocaleDateString();

// Definimos las partes por separado
const textoPuro = "PRODUCCIÓN — ESTUDIO MAGNO";
const glifo = "|"; // Aquí va tu separador o glifo puro

// Creamos la secuencia: Texto + Glifo + Texto + Glifo...
// Usamos un array y join para que queden como elementos hermanos
const pieza = `<span>${textoPuro}</span><span>${glifo}</span>`;
const contenidoFinal = pieza.repeat(15); 

document.getElementById('marquesina').parentElement.innerHTML = `
    <div class="texto-movil">${contenidoFinal}</div>
    <div class="texto-movil" aria-hidden="true">${contenidoFinal}</div>
`;
    // Configuración PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Manejo de PDF
document.getElementById('subir-pdf').onchange = function(e) {
    const file = e.target.files[0];
    const contenedorNombre = document.getElementById('nombre-archivo-pdf');
    if (file && file.type === "application/pdf") {
        contenedorNombre.textContent = file.name;
        const reader = new FileReader();
        reader.onload = function() {
            const typedarray = new Uint8Array(this.result);
            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                // Actualizamos el número de páginas
                document.getElementById('num-paginas').value = pdf.numPages;
                
                // Forzamos el cálculo dos veces: una inmediata y otra tras un micro-segundo
                // Esto asegura que el navegador haya "asimilado" el número nuevo.
                calcular();
                setTimeout(calcular, 100); 
            });
        };
        reader.readAsArrayBuffer(file);
    }
};

function calcular() {
    const paginasPDF = parseInt(document.getElementById('num-paginas').value) || 0;
    const paginasPorCarilla = parseInt(document.getElementById('paginas-por-carilla').value) || 1;
    const esDoble = document.querySelector('input[name="tipo-faz"]:checked').value === 'doble';
    const requiereAnillado = document.getElementById('con-anillado').checked;
    
    let carillasTotales = Math.ceil(paginasPDF / paginasPorCarilla);
    let hojas = esDoble ? Math.ceil(carillasTotales / 2) : carillasTotales;

    // --- LISTA DE PRECIOS FOTOCOPIAS ---
    const ESCALA_SIMPLE = [
        { hasta: 250, precio: 100 },
        { hasta: 400, precio: 90 },
        { hasta: Infinity, precio: 80 }
    ];

    const ESCALA_DOBLE = [
        { hasta: 70, precio: 190 },
        { hasta: 200, precio: 160 },
        { hasta: Infinity, precio: 150 }
    ];

    const escala = esDoble ? ESCALA_DOBLE : ESCALA_SIMPLE;
    let rangoEncontrado = escala.find(r => hojas <= r.hasta) || escala[escala.length - 1];
    let precioHoja = rangoEncontrado.precio;

    // --- LISTA DE ESPIRALES (TABLA UNIFICADA) ---
    let costoAnillado = 0;
    let etiquetaEspiral = "";
    
    const TABLA_ESPIRAL = [
        { hasta: 48, m: "7-9mm", p: 1300 },
        { hasta: 83, m: "12-14mm", p: 1500 },
        { hasta: 116, m: "17-20mm", p: 1800 },
        { hasta: 155, m: "23-25mm", p: 2000 },
        { hasta: 245, m: "29-33mm", p: 2700 },
        { hasta: 345, m: "36-40mm", p: 3300 },
        { hasta: 445, m: "45-50mm", p: 4500 } 
        // No agregamos más filas para que el .find() devuelva 'undefined' si supera 445
    ];

    if (requiereAnillado && hojas > 0) {
        let espiral = TABLA_ESPIRAL.find(e => hojas <= e.hasta);
        
        if (espiral) {
            etiquetaEspiral = espiral.m;
            costoAnillado = espiral.p;
        } else {
            // SI SUPERA LAS 445 HOJAS:
            etiquetaEspiral = "EXCEDE LÍMITE (Máx 445h)";
            costoAnillado = 0; // El precio vuelve a cero porque no se puede hacer
        }
    }

    // --- ACTUALIZACIÓN DE INTERFAZ ---
    document.getElementById('total-hojas').textContent = hojas;
    
    // Mostramos el mensaje de error o el precio
    document.getElementById('precio-anillado').textContent = costoAnillado > 0 
        ? `${etiquetaEspiral} — $${costoAnillado}` 
        : (requiereAnillado && hojas > 445 ? etiquetaEspiral : "$0");
    
    const subtotal = (hojas * precioHoja) + costoAnillado;
    const totalRedondeado = Math.ceil(subtotal / 100) * 100;
    
    document.getElementById('total-precio').textContent = totalRedondeado.toLocaleString('es-AR');
}


function pasoPaginaPorCarilla(delta) {
    const input = document.getElementById('paginas-por-carilla');
    let v = parseInt(input.value);
    
    // Si es 1 y sube, va a 2. Si es 2 y baja, va a 1.
    // Para el resto, se mueve de a 2 unidades.
    let next;
    if (v === 1 && delta > 0) {
        next = 2;
    } else if (v === 2 && delta < 0) {
        next = 1;
    } else {
        next = v + (delta * 2);
    }

    // Límites de seguridad
    if (next < 1) next = 1; 
    if (next > 6) next = 6;
    
    // Validación final para evitar el 3 y el 5 si alguien escribe manual
    if (next === 3) next = (delta > 0) ? 4 : 2;
    if (next === 5) next = (delta > 0) ? 6 : 4;

    input.value = next;
    calcular(); 
}

function descargarTicket() {
    const ticketCanvas = document.createElement('canvas');
    const tCtx = ticketCanvas.getContext('2d');
    ticketCanvas.width = 400;
    ticketCanvas.height = 550;

    tCtx.fillStyle = "#fff";
    tCtx.fillRect(0, 0, ticketCanvas.width, ticketCanvas.height);
    tCtx.fillStyle = "#000";
    tCtx.strokeStyle = "#000";
    tCtx.lineWidth = 2;
    tCtx.strokeRect(10, 10, 380, 530);

    const cliente = document.getElementById('nombre-cliente').value || "________________";
    const paginasPDF = document.getElementById('num-paginas').value || 0;
    const pByP = parseInt(document.getElementById('paginas-por-carilla').value) || 1;
    const faz = document.querySelector('input[name="tipo-faz"]:checked').value.toUpperCase();
    const total = document.getElementById('total-precio').textContent;
    const fecha = new Date().toLocaleDateString();
    
    // Lógica inteligente para el texto de anillado en el ticket
    const requiereAnillado = document.getElementById('con-anillado').checked;
    const hojasFisicas = parseInt(document.getElementById('total-hojas').textContent) || 0;
    let textoAnillado = "NO";
    
    if (requiereAnillado) {
        if (hojasFisicas > 445) {
            textoAnillado = "EXCEDE LÍMITE";
        } else {
            textoAnillado = "SÍ";
        }
    }

    tCtx.font = "bold 24px monospace";

// --- LÓGICA DE FOTOS ---
    const HOJAS = { "A3": { wIn: 11.69, hIn: 16.54 }, "A4": { wIn: 8.27, hIn: 11.69 }, "A5": { wIn: 5.83, hIn: 8.27 }, "A6": { wIn: 4.13, hIn: 5.83 }, "LEGAL": { wIn: 8.5, hIn: 14.0 } };
    const MEDIDAS_PREDEFINIDAS = {
        "A4": [
            { n: "13x18 cm (2 por hoja)", w: 18, h: 13, c: 1, r: 2, mI: 0.5 },
            { n: "10x15 cm (2 por hoja)", w: 15, h: 10, c: 1, r: 2, mI: 2.0 },
            { n: "9x13 cm (4 por hoja)", w: 9, h: 13, c: 2, r: 2, mI: 0.5 },
            { n: "20x25 cm (1 por hoja)", w: 20, h: 25, c: 1, r: 1 },
        ],
        "A6": [{ n: "Carnet 4x4 cm (6 por hoja)", w: 4, h: 4, c: 2, r: 3, carnet: true, mI: 0.5 }]
    };

    const GRID_ESPECIAL = { 1:{c:1,r:1}, 2:{c:1,r:2}, 3:{c:1,r:3}, 4:{c:2,r:2}, 6:{c:2,r:3}, 8:{c:2,r:4}, 9:{c:3,r:3}, 10:{c:2,r:5} };
    let imagenes = [], pagIdx = 0;
    const canvas = document.getElementById('canvas-preview'), ctx = canvas.getContext('2d');

    function cambiarTab(id, btn) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`seccion-${id}`).classList.add('active');
        btn.classList.add('active');
        window.scrollTo(0, 0); 
        if(id === 'fotos') renderizar();
    }

    function cambiarConfig() {
        const h = document.getElementById('tipo-hoja').value;
        const sel = document.getElementById('medida-foto');
        let html = (h !== 'A6') ? `<option value="especial">✨ Medida Especial</option>` : "";
        if(MEDIDAS_PREDEFINIDAS[h]) MEDIDAS_PREDEFINIDAS[h].forEach((m, i) => html += `<option value="${i}">${m.n}</option>`);
        sel.innerHTML = html;
        gestionarInterfazEspecial();
    }

    function gestionarInterfazEspecial() {
        const esEspecial = document.getElementById('medida-foto').value === 'especial';
        document.getElementById('contenedor-contador').style.display = esEspecial ? 'flex' : 'none';
        renderizar();
    }

    function pasoContador(delta) {
        const input = document.getElementById('cant-especial');
        let v = parseInt(input.value);
        let next = v + delta;
        if (next === 5) next = (delta > 0) ? 6 : 4;
        if (next === 7) next = (delta > 0) ? 8 : 6;
        if (next < 1) next = 1; if (next > 10) next = 10;
        input.value = next;
        renderizar();
    }

    function renderizar() {
        const hojaKey = document.getElementById('tipo-hoja').value;
        const medVal = document.getElementById('medida-foto').value;
        const hDim = HOJAS[hojaKey];
        canvas.width = Math.round(hDim.wIn * DPI);
        canvas.height = Math.round(hDim.hIn * DPI);
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        let config;
        if(medVal === 'especial') {
            const cant = parseInt(document.getElementById('cant-especial').value);
            const grid = GRID_ESPECIAL[cant];
            const mE = 1 * F ;
            const mI = 0.5 * F; 
            const wFoto = (canvas.width - (2 * mE) - (grid.c - 1) * mI) / grid.c;
            const hFoto = (canvas.height - (2 * mE) - (grid.r - 1) * mI) / grid.r;
            config = { w: wFoto / F, h: hFoto / F, c: grid.c, r: grid.r, mI: 0.5, mE: 1 };
        } else {
            config = MEDIDAS_PREDEFINIDAS[hojaKey][medVal];
        }
        dibujarFotos(config);
    }

    function dibujarFotos(conf) {
        if(!imagenes.length) return;
        const porHoja = conf.c * conf.r;
        document.getElementById('p-tot').textContent = conf.carnet ? 1 : Math.ceil(imagenes.length / porHoja);
        document.getElementById('p-act').textContent = pagIdx + 1;

        let filtros = "";
        if (document.getElementById('optimizador').checked) filtros += "brightness(1.15) contrast(1.1) saturate(1.05) ";
        if (document.getElementById('modo-calido').checked) filtros += "sepia(0.4) brightness(1.05) ";
        if (document.getElementById('modo-negativo').checked) filtros += "grayscale(1) invert(1) ";

        const mE = (conf.mE || 0) * F, mI = (conf.mI || 0.5) * F;
        const wPx = conf.w * F, hPx = conf.h * F;
        let startX = conf.mE ? mE : (canvas.width - (conf.c * wPx + (conf.c - 1) * mI)) / 2;
        let startY = conf.mE ? mE : (canvas.height - (conf.r * hPx + (conf.r - 1) * mI)) / 2;

        for(let i=0; i < porHoja; i++) {
            let img = conf.carnet ? imagenes[0] : imagenes[(pagIdx * porHoja) + i];
            if(!img) break;
            const col = i % conf.c, fila = Math.floor(i / conf.c);
            const x = startX + col * (wPx + mI), y = startY + fila * (hPx + mI);
            ctx.save();
            ctx.filter = filtros || "none";
            ctx.beginPath(); ctx.rect(x, y, wPx, hPx); ctx.clip();
            let dW = img.width, dH = img.height, rot = 0;
            if((img.width > img.height) !== (wPx > hPx)) { rot = 90; dW = img.height; dH = img.width; }
            let ratio = document.getElementById('rellenar').checked ? Math.max(wPx/dW, hPx/dH) : Math.min(wPx/dW, hPx/dH);
            ctx.translate(x + wPx/2, y + hPx/2); if(rot) ctx.rotate(Math.PI/2);
            ctx.drawImage(img, -(img.width*ratio)/2, -(img.height*ratio)/2, img.width*ratio, img.height*ratio);
            ctx.restore(); // Aquí termina el recorte de la imagen

            // LÍNEAS DE CORTE MEJORADAS
            if (document.getElementById('lineas-corte').checked) {
                ctx.save(); // Guardamos estado limpio
                ctx.filter = "none"; // Quitamos filtros para que la línea no salga con brillo/contraste
                ctx.strokeStyle = "#888888"; // Un gris más oscuro y visible
                ctx.lineWidth = 2; // Un poquito más gruesa
                ctx.setLineDash([10, 10]); // Línea punteada para que no parezca parte de la foto
                ctx.strokeRect(x, y, wPx, hPx);
                ctx.restore();
            }    }
    }

    document.getElementById('fotos-input').onchange = (e) => {
        const archivos = Array.from(e.target.files);
        imagenes = []; let counts = 0;
        archivos.forEach(f => {
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image();
                img.onload = () => { imagenes.push(img); counts++; if(counts === archivos.length) { pagIdx = 0; renderizar(); } };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        });
    };

    async function descargar() {
        const total = parseInt(document.getElementById('p-tot').textContent);
        for(let i=0; i<total; i++) {
            pagIdx = i; renderizar();
            const a = document.createElement('a');
            a.download = `MAGNO_P${i+1}.jpg`;
            a.href = canvas.toDataURL("image/jpeg", 0.92);
            a.click();
            await new Promise(res => setTimeout(res, 800));
        }
    }

    function pagAnt() { if(pagIdx > 0) { pagIdx--; renderizar(); } }
    function pagSig() { if(pagIdx < parseInt(document.getElementById('p-tot').textContent)-1) { pagIdx++; renderizar(); } }
    cambiarConfig();

            cargarImagenDesdeRuta(ruta);
        }
    });
});

async function contarPaginasPDF(ruta) {
    try {
        const loadingTask = pdfjsLib.getDocument('file://' + ruta);
        const pdf = await loadingTask.promise;
        document.getElementById('num-paginas').value = pdf.numPages;
        const nombreArr = ruta.split('\\').pop().split('/').pop();
        
        // CORRECCIÓN: Usar textContent y el ID correcto del div
        const contenedorNombre = document.getElementById('nombre-archivo-pdf');
        if(contenedorNombre) {
            contenedorNombre.textContent = nombreArr.replace('.pdf', '').toUpperCase();
        }
        
        calcular(); // Llamada directa
    } catch (e) {
        console.error("Error al leer PDF:", e);
    }
}

async function obtenerImagenesDePaginas() {
    const totalElemento = document.getElementById('p-tot');
    const total = totalElemento ? parseInt(totalElemento.textContent) : 1;
    let imagenesPaginas = [];
    
    const originalIdx = pagIdx;

    for (let i = 0; i < total; i++) {
        pagIdx = i;
        renderizar(); // Dibuja la página con tus filtros y ajustes
        const dataUrl = canvas.toDataURL("image/jpeg", 0.9); 
        imagenesPaginas.push(dataUrl);
    }

    pagIdx = originalIdx;
    renderizar();
    
    return imagenesPaginas;
}
