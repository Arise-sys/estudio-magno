<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTUDIO MAGNO | Producción</title>
    <style>
        :root { --fuente-mono: "SFMono-Regular", Consolas, monospace; }

        
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-y: scroll; 
            overflow-x: hidden; 
            width: 100vw; 
            font-family: sans-serif;
            background-image: linear-gradient(rgba(230, 230, 230, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(230, 230, 230, 0.5) 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 25px; 
            background: white; 
            border-bottom: 2px solid #000; 
            z-index: 10; 
            font-family: var(--fuente-mono); 
        }

        .logo-link {
            text-decoration: none; /* Quita el subrayado */
            color: inherit;        /* Mantiene el color negro original */
            cursor: pointer;      /* Cambia el cursor a la "manito" al pasar el mouse */
        }

        .logo-link:hover {
        opacity: 0.7;          /* Un pequeño efecto visual al tocarlo */
        }

        /* Nueva Marquesina Profesional */
        .contenedor-bucle { 
            --gap: 3rem; 
            width: 100%; 
            background: #000; 
            overflow: hidden; 
            padding: 10px 0; 
            display: flex; 
            user-select: none;
            gap: var(--gap);
        }

        .texto-movil { 
            flex-shrink: 0;
            display: flex; 
            justify-content: flex-start;
            min-width: 100%;
            gap: var(--gap);
            animation: desplaza 30s linear infinite; 
            font-family: var(--fuente-mono); 
            color: #fff; 
            text-transform: uppercase; 
            white-space: nowrap; 
        }

        @keyframes desplaza { 
            from { transform: translateX(0); } 
            to { transform: translateX(calc(-100% - var(--gap))); } 
        }

        @media (prefers-reduced-motion: reduce) {
            .texto-movil { animation-play-state: paused; }
        }

        nav { display: flex; justify-content: center; background: none; }
        
        .tab-btn { 
            padding: 15px 30px; 
            border: none; 
            background: none; 
            cursor: pointer; 
            font-family: var(--fuente-mono); 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        
        .tab-btn:hover { background: #e0e0e0; }
        .tab-btn.active { background: #000; color: #fff; }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
            padding-bottom: 50px;
        }

        .seccion { 
            display: none; 
            width: 100%; 
            justify-content: center; 
        }

        .seccion.active { display: flex; }

        .panel { 
            background: #fff; 
            padding: 25px; 
            border: 2px solid #000; 
            width: 450px; 
            box-shadow: 10px 10px 0 #e0e0e0; 
            font-family: var(--fuente-mono); 
            margin-top: 20px; 
            margin-bottom: 40px; 
            box-sizing: border-box; 
        }

/* Este es el nuevo contenedor exclusivo para fotos */
.panel-fotos {
    background: #fff;
    padding: 25px;
    border: 2px solid #000;
    width: 450px; /* Empezamos con el mismo ancho que el original */
    box-shadow: 10px 10px 0 #e0e0e0;
    font-family: var(--fuente-mono);
    margin-top: 20px;
    margin-bottom: 40px;
    box-sizing: border-box;
    
    /* ESTO ES LO NUEVO: Preparamos la caja para que lo de adentro se pueda repartir */
    display: flex;
    flex-wrap: wrap; 
    gap: 20px;
    justify-content: center;
}

/* Cuando la pantalla sea grande, el panel de fotos se ensancha al doble */
@media (min-width: 1100px) {
    .panel-fotos {
        width: 950px; /* Casi el doble de ancho */
    }
}


        h3 { border-bottom: 3px solid #000; padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        select, input[type="number"] { width: 100%; padding: 8px; border: 2px solid #000; box-sizing: border-box; font-family: var(--fuente-mono); height: 42px; }
        
        .contenedor-nombre-pdf {
            margin: 15px 0;
            font-family: var(--fuente-mono);
            font-size: 0.9rem;
            color: #000;
            line-height: 1.2rem;
            height: 2.4rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-all;
        }

        .resultado-calc { background: #000; color: #fff; padding: 20px; margin-top: 15px; }
        #total-precio { font-size: 3rem; font-weight: bold; }
        .btn-magno { background: #000; color: #fff; padding: 12px; border: none; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 10px; font-family: var(--fuente-mono); }
        
        /* Estilos Fotos */
        .fila-medida { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; width: 100%; }
        .col-medida { flex: 1; display: flex; flex-direction: column; }
        .col-contador { width: 130px; display: none; flex-direction: column; }
        .stepper { display: flex; border: 2px solid #000; height: 42px; background: #fff; }
        .stepper button { width: 40px; border: none; background: #000; color: #fff; font-size: 1.2rem; cursor: pointer; }
        .stepper input { flex: 1; border: none; text-align: center; font-weight: bold; width: 100%; outline: none; }
        #canvas-preview { border: 1px solid #000; width: 100%; background: #f0f0f0; margin-top: 10px; }
        .controles-pag { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px 0; }
        .opcion-check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; margin-bottom: 8px; }




/* 1. Fondo general y Header en Negro */
body.tema-negativo, 
body.tema-negativo header {
    background-color: #202020 !important;
    color: #fff !important;
    border-color: #fff !important;
}

/* 2. El Panel principal se vuelve negro con bordes blancos */
body.tema-negativo .panel {
    background-color: #303030 !important;
    border-color: #fff !important;
    box-shadow: 10px 10px 0 #333 !important;
}

/* 3. Textos y etiquetas en blanco para que se lean en el panel negro */
body.tema-negativo h3, 
body.tema-negativo label, 
body.tema-negativo .contenedor-nombre-pdf,
body.tema-negativo .tab-btn:not(.active) {
    color: #fff !important;
    border-color: #fff !important;
}

/* 4. LA CAJA DE RESULTADOS: El contenedor pequeño se vuelve blanco entero */
body.tema-negativo .resultado-calc {
    background-color: #fff !important; /* Toda la caja se vuelve blanca */
    color: #252525 !important;            /* El texto de adentro se vuelve negro */
    border: 2px solid #1d1d1d !important;
}

/* Forzamos a que los números y etiquetas internas hereden el negro */
body.tema-negativo .resultado-calc span, 
body.tema-negativo .resultado-calc div {
    color: #313131 !important;
}

body.tema-negativo .resultado-calc hr {
    border-color: #292929 !important; /* La línea divisoria ahora es negra */
}

/* 5. Marcos de Simple/Doble y Anillado en Blanco */
body.tema-negativo div[style*="border"], 
body.tema-negativo label[style*="border"] {
    border-color: #fff !important;
}

/* 6. Inputs y Selectores con fondo oscuro */
body.tema-negativo input[type="number"], 
body.tema-negativo select {
    background: #222 !important;
    color: #fff !important;
    border-color: #fff !important;
}
body.tema-negativo .btn-magno { background-color: #fff !important; color: #292929 !important; }
body.tema-negativo .contenedor-bucle { background-color: #fff !important; }
body.tema-negativo .texto-movil { color: #1d1d1d !important; }
/* La pestaña activa: Fondo blanco, texto negro */
body.tema-negativo .tab-btn.active { 
    background-color: #fff !important; 
    color: #1b1b1b !important; 
}

/* La pestaña inactiva: Texto blanco (para que no se pierda en el fondo oscuro) */
body.tema-negativo .tab-btn { 
    color: #fff !important; 
}

body.tema-negativo .controles-pag .btn-magno { background-color: #fff !important; color: #000 !important; }
body.tema-negativo .btn-magno, 
body.tema-negativo .stepper button { background-color: #fff !important; color: #000 !important; }

body.tema-negativo .stepper { border-color: #fff !important; }
body.tema-negativo .stepper input { background: #222 !important; color: #fff !important; }

/* CSS para la caja de texto del cliente */

<svg style="display:none">
  <defs>
    <filter id="magno-pure-svg" color-interpolation-filters="sRGB">
      <!-- 1. MATRIZ: Ajustada para ser mucho más suave y evitar el tinte violeta -->
      <feColorMatrix type="matrix" values="
        0.9, 0, 0, 0, 0.05
        0, 0.9, 0, 0, 0.05
        0, 0, 1.0, 0, 0.1
        0, 0, 0, 1, 0" />

      <!-- 2. TABLA DE TRANSFERENCIA: Esto es lo que evita que se queme -->
      <feComponentTransfer>
        <!-- La 'table' define que aunque la entrada sea 100% luz, la salida sea 90% (evita el blanco quemado) -->
        <feFuncR type="table" tableValues="0.05 0.9" />
        <feFuncG type="table" tableValues="0.05 0.9" />
        <!-- El azul empieza un poco más arriba (0.1) para dar el tono frío en sombras -->
        <feFuncB type="table" tableValues="0.1 0.95" />
      </feComponentTransfer>
    </filter>
  </defs>
</svg>

<script>


// 1. Cambiamos las definiciones iniciales a let
let DPI = 300;
let F = DPI / 2.54;

// 2. La función que dispara el cambio
function actualizarDPI() {
    console.log("--- Intento de cambio de DPI ---");
    const elCheck = document.getElementById('check-alta-res');
    
    if (elCheck.checked) {
        DPI = 600;
    } else {
        DPI = 300;
    }

    F = DPI / 2.54;

    if (typeof renderizar === 'function') {
        renderizar();
    }
}    document.getElementById('fecha').textContent = new Date().toLocaleDateString();
    // ... resto de tu código de la marquesina (Estudio Magno | ...)
// Definimos las partes por separado
const textoPuro = "PRODUCCIÓN — ESTUDIO MAGNO";
const glifo = "|"; // Aquí va tu separador o glifo puro

// Creamos la secuencia: Texto + Glifo + Texto + Glifo...
// Usamos un array y join para que queden como elementos hermanos
const pieza = `<span>${textoPuro}</span><span>${glifo}</span>`;
const contenidoFinal = pieza.repeat(15); 

document.getElementById('marquesina').parentElement.innerHTML = `
    <div class="texto-movil">${contenidoFinal}</div>
    <div class="texto-movil" aria-hidden="true">${contenidoFinal}</div>
`;
    // Configuración PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Manejo de PDF
document.getElementById('subir-pdf').onchange = function(e) {
    const file = e.target.files[0];
    const contenedorNombre = document.getElementById('nombre-archivo-pdf');
    if (file && file.type === "application/pdf") {
        contenedorNombre.textContent = file.name;
        const reader = new FileReader();
        reader.onload = function() {
            const typedarray = new Uint8Array(this.result);
            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                // Actualizamos el número de páginas
                document.getElementById('num-paginas').value = pdf.numPages;
                
                // Forzamos el cálculo dos veces: una inmediata y otra tras un micro-segundo
                // Esto asegura que el navegador haya "asimilado" el número nuevo.
                calcular();
                setTimeout(calcular, 100); 
            });
        };
        reader.readAsArrayBuffer(file);
    }
};

function validarChecks(quien) {
    const escuela = document.getElementById('check-escuela');
    const folleto = document.getElementById('check-folleto');

    if (quien === 'escuela' && escuela.checked) folleto.checked = false;
    if (quien === 'folleto' && folleto.checked) escuela.checked = false;

    calcular(); // Recalcular precio al cambiar el modo
}

function calcular() {
    const paginasPDF = parseInt(document.getElementById('num-paginas').value) || 0;
    const paginasPorCarilla = parseInt(document.getElementById('paginas-por-carilla').value) || 1;
    const esDoble = document.querySelector('input[name="tipo-faz"]:checked').value === 'doble';
    const requiereAnillado = document.getElementById('con-anillado').checked;
    
    const esEscuela = document.getElementById('check-escuela').checked;
    const esFolleto = document.getElementById('check-folleto').checked;

    let carillasTotales = Math.ceil(paginasPDF / paginasPorCarilla);
    let hojas = esDoble ? Math.ceil(carillasTotales / 2) : carillasTotales;

    // --- LISTAS DE PRECIOS ---
    const ESCALA_SIMPLE = [
        { hasta: Infinity, precio: 100 }];
    const ESCALA_DOBLE = [
        { hasta: 100, precio: 200 },
        { hasta: Infinity, precio: 160 }
    ];

    const ESCALA_ESCUELA_SIMPLE = [
        { hasta: Infinity, precio: 100 }
    ];
    const ESCALA_ESCUELA_DOBLE = [
        { hasta: Infinity, precio: 160 }
    ];

    const ESCALA_FOLLETO_SIMPLE = [
        { hasta: 200, precio: 100 },
        { hasta: 400, precio: 90 },
        { hasta: Infinity, precio: 80 }
    ];

    // Selección de escala
    let escala;
    if (esEscuela) {
        escala = esDoble ? ESCALA_ESCUELA_DOBLE : ESCALA_ESCUELA_SIMPLE;
    } else if (esFolleto) {
        escala = ESCALA_FOLLETO_SIMPLE;
    } else {
        escala = esDoble ? ESCALA_DOBLE : ESCALA_SIMPLE;
    }

    let rangoEncontrado = escala.find(r => hojas <= r.hasta) || escala[escala.length - 1];
    let precioHoja = rangoEncontrado.precio;

    // --- LÓGICA DE ANILLADO ---
    let costoAnillado = 0;
    let etiquetaEspiral = "";
    const TABLA_ESPIRAL = [
        { hasta: 48, m: "7-9mm", p: 1500 },
        { hasta: 83, m: "12-14mm", p: 1800 },
        { hasta: 116, m: "17-20mm", p: 2000 },
        { hasta: 155, m: "23-25mm", p: 2500 },
        { hasta: 245, m: "29-33mm", p: 3500 },
        { hasta: 345, m: "36-40mm", p: 4500 },
        { hasta: 445, m: "45-50mm", p: 5500 }
    ];

    if (requiereAnillado && hojas > 0) {
        let espiral = TABLA_ESPIRAL.find(e => hojas <= e.hasta);
        if (espiral) {
            etiquetaEspiral = espiral.m;
            costoAnillado = espiral.p;
        } else {
            etiquetaEspiral = "EXCEDE LÍMITE (Máx 445h)";
            costoAnillado = 0;
        }
    }

    // --- ACTUALIZACIÓN DE INTERFAZ ---
    document.getElementById('total-hojas').textContent = hojas;
    document.getElementById('precio-anillado').textContent = costoAnillado > 0 
        ? `${etiquetaEspiral} — $${costoAnillado}` 
        : (requiereAnillado && hojas > 445 ? etiquetaEspiral : "$0");
    
    const subtotal = (hojas * precioHoja) + costoAnillado;
    const totalRedondeado = Math.ceil(subtotal / 100) * 100;
    
    document.getElementById('total-precio').textContent = totalRedondeado.toLocaleString('es-AR');
}

function pasoPaginaPorCarilla(delta) {
    const input = document.getElementById('paginas-por-carilla');
    let v = parseInt(input.value);
    
    // Si es 1 y sube, va a 2. Si es 2 y baja, va a 1.
    // Para el resto, se mueve de a 2 unidades.
    let next;
    if (v === 1 && delta > 0) {
        next = 2;
    } else if (v === 2 && delta < 0) {
        next = 1;
    } else {
        next = v + (delta * 2);
    }

    // Límites de seguridad
    if (next < 1) next = 1; 
    if (next > 6) next = 6;
    
    // Validación final para evitar el 3 y el 5 si alguien escribe manual
    if (next === 3) next = (delta > 0) ? 4 : 2;
    if (next === 5) next = (delta > 0) ? 6 : 4;

    input.value = next;
    calcular(); 
}

function ejecutarFlujoPolaroid(conf) {
    if (!imagenes || imagenes.length === 0) return;

    // --- EL BLOQUEO ---
    const checkCorte = document.getElementById('lineas-corte');
    if (checkCorte) {
        checkCorte.checked = true;   // Se marca solo
        checkCorte.disabled = true;  // Se pone gris (bloqueado)
    }

    const tipoHoja = document.getElementById('tipo-hoja').value;
    const configActual = COORDENADAS_POLAROID[tipoHoja] || COORDENADAS_POLAROID['A4'];
    const miF = canvas.width / configActual.anchoPapelMM; 
    const sizePx = 79 * miF; // El tamaño del cuadrado de la foto interna

    // Dibujo de marcas (Líneas infinitas de borde a borde)
    if (configActual.marcasCorte) {
        ctx.save();
        ctx.strokeStyle = "rgba(180, 180, 180, 0.7)"; 
        ctx.lineWidth = 1;
        
        configActual.marcasCorte.forEach(m => {
            ctx.beginPath();
            if (m.dir === 'h') {
                ctx.moveTo(0, m.y * miF); 
                ctx.lineTo(canvas.width, m.y * miF);
            } else {
                ctx.moveTo(m.x * miF, 0);
                ctx.lineTo(m.x * miF, canvas.height);
            }
            ctx.stroke();
        });
        ctx.restore();
    }

    const copias = parseInt(document.getElementById('input-repetir').value) || 1;
    let imagenesFinales = [];
    imagenes.forEach(img => { for (let i = 0; i < copias; i++) imagenesFinales.push(img); });
    
    const posiciones = configActual.posiciones;
    const porHoja = posiciones.length;
    const totalPaginas = Math.ceil(imagenesFinales.length / porHoja);
    
    document.getElementById('p-tot').textContent = totalPaginas;
    if (pagIdx >= totalPaginas) pagIdx = Math.max(0, totalPaginas - 1);
    document.getElementById('p-act').textContent = pagIdx + 1;

    for (let i = 0; i < porHoja; i++) {
        let img = imagenesFinales[(pagIdx * porHoja) + i];
        if (!img) break;
        
        const posX = posiciones[i][0] * miF;
        const posY = posiciones[i][1] * miF;
        
        ctx.save();

        // 1. FILTROS
        const filtrosFinales = obtenerFiltrosConfigurados();
        ctx.filter = filtrosFinales;

        // 2. RECORTE (Clip del cuadrado de la foto)
        ctx.beginPath(); 
        ctx.rect(posX, posY, sizePx, sizePx); 
        ctx.clip();

        // 3. CENTRADO Y ROTACIÓN
        // Calculamos el centro del cuadrado de la foto
        const centroX = posX + (sizePx / 2);
        const centroY = posY + (sizePx / 2);
        
        // Movemos el origen al centro del cuadrado
        ctx.translate(centroX, centroY);

        // Si la configuración de la hoja pide rotar (para A5 acostadas)
        if (configActual.rotar) {
            ctx.rotate(-Math.PI / 2); // 90 grados
        }

        // 4. CÁLCULO DE TAMAÑO (Cover)
        let ratio = Math.max(sizePx / img.width, sizePx / img.height);
        let dW = img.width * ratio; 
        let dH = img.height * ratio;

        // 5. ENCUADRE (Offset)
        let offX = 0;
        let offY = 0;

        if (dW > sizePx) {
            let maxScrollX = (dW - sizePx) / 2;
            offX = (img.offset || 0) * maxScrollX;
        } else if (dH > sizePx) {
            let maxScrollY = (dH - sizePx) / 2;
            offY = (img.offset || 0) * maxScrollY;
        }

        // 6. DIBUJAMOS
        // Como hicimos translate al centro, dibujamos centrado en (0,0) 
        // El cálculo "(sizePx - dW) / 2" se simplifica a "-dW / 2"
        ctx.drawImage(
            img, 
            (-dW / 2) + offX, 
            (-dH / 2) + offY, 
            dW, 
            dH
        );
        
        ctx.restore(); // Limpia filtros, translate, rotate y clip para la siguiente
    }
}
function pasoRepetir(delta) {
    const input = document.getElementById('input-repetir');
    if (!input) return;

    let valorActual = parseInt(input.value) || 1;
    let nuevoValor = valorActual + delta;

    // Límites lógicos para el negocio
    if (nuevoValor < 1) nuevoValor = 1;
    if (nuevoValor > 100) nuevoValor = 100;

    input.value = nuevoValor;

    // IMPORTANTE: Resetear el índice de página a 0 para evitar que el usuario 
    // quede en una "página inexistente" si baja la cantidad de copias.
    pagIdx = 0; 

    if (typeof renderizar === "function") {
        renderizar();
    }
}

function dibujarFotos(conf) {
    if(!imagenes.length) return;

const modoPolaroidActivo = document.getElementById('check-modo-polaroid')?.checked;
const checkCorte = document.getElementById('lineas-corte');

// --- ESTO ES LO NUEVO ---
if (!modoPolaroidActivo && checkCorte) {
    checkCorte.disabled = false; // Liberamos el botón para que puedas usarlo
}
// ------------------------

if (modoPolaroidActivo) {
    ejecutarFlujoPolaroid(conf); 
    return; 
}
    // --- CÁLCULO DE ESCALA ---
    const tipoHoja = document.getElementById('tipo-hoja').value;
    const anchoPulgadas = HOJAS[tipoHoja].wIn;
    const anchoPapelMM = anchoPulgadas * 25.4;
    const miF = canvas.width / anchoPapelMM;

    // --- 1. LÓGICA DE IMÁGENES (Preparamos qué fotos hay en esta página) ---
    const inputRepetir = document.getElementById('input-repetir');
    const copias = inputRepetir ? (parseInt(inputRepetir.value) || 1) : 1;
    let imagenesFinales = [];
    imagenes.forEach(img => { for (let i = 0; i < copias; i++) imagenesFinales.push(img); });

    const porHoja = conf.c * conf.r;
    
    // Detectamos qué contenedores tienen imagen realmente
    const contenedoresConFoto = [];
    for(let i=0; i < porHoja; i++) {
        if(imagenesFinales[(pagIdx * porHoja) + i]) {
            contenedoresConFoto.push(i + 1); // Guardamos el ID del contenedor (1, 2, 3...)
        }
    }

// --- 2. DIBUJO DE MARCAS DE CORTE ---
    if (checkCorte && checkCorte.checked) {
        let nombreMedida = conf.n || "";
        let claveMatch = Object.keys(MARCAS_ESTANDAR_FIJAS).find(k => nombreMedida.includes(k));

        // 2a. Dibujo de marcas estándar (10x15, 13x18, etc.)
        if (claveMatch) {
            const marcas = MARCAS_ESTANDAR_FIJAS[claveMatch][tipoHoja] || [];
            ctx.save();
            ctx.strokeStyle = "rgba(180, 180, 180, 0.7)"; 
            ctx.lineWidth = 1;
            marcas.forEach(m => {
                if (contenedoresConFoto.includes(m.c)) {
                    ctx.beginPath();
                    if (m.dir === 'h') {
                        ctx.moveTo(0, m.y * miF); 
                        ctx.lineTo(canvas.width, m.y * miF);
                    } else {
                        const yIni = m.yRango ? m.yRango[0] * miF : 0;
                        const yFin = m.yRango ? m.yRango[1] * miF : canvas.height;
                        ctx.moveTo(m.x * miF, yIni);
                        ctx.lineTo(m.x * miF, yFin);
                    }
                    ctx.stroke();
                }
            });
            ctx.restore();
        }

        // 2b. NUEVO: Marco individual para MEDIDA ESPECIAL
        // Solo entra si la medida es especial y el checkbox de líneas está marcado
        if (document.getElementById('medida-foto').value === 'especial') {
            const wPx = conf.w * miF * 10; 
            const hPx = conf.h * miF * 10;
            const mI = (conf.mI || 0.5) * miF * 10;
            const mE = (conf.mE || 1) * miF * 10; // Usamos el margen externo configurado

            ctx.save();
            ctx.strokeStyle = "#ddd"; 
            ctx.lineWidth = 1;

            for(let i=0; i < porHoja; i++) {
                if (contenedoresConFoto.includes(i + 1)) {
                    const col = i % conf.c, fila = Math.floor(i / conf.c);
                    const x = mE + col * (wPx + mI); // Calculamos la posición del contenedor
                    const y = mE + fila * (hPx + mI);
                    ctx.strokeRect(x, y, wPx, hPx);
                }
            }
            ctx.restore();
        }
    }
    // --- 3. DIBUJO DE LAS FOTOS ---
    const totalPaginas = Math.ceil(imagenesFinales.length / porHoja);
    document.getElementById('p-tot').textContent = totalPaginas;
    if (pagIdx >= totalPaginas) pagIdx = Math.max(0, totalPaginas - 1);
    document.getElementById('p-act').textContent = pagIdx + 1;

    const filtros = obtenerFiltrosConfigurados();
    const wPx = conf.w * miF * 10; 
    const hPx = conf.h * miF * 10;
    const mI = (conf.mI || 0.5) * miF * 10;
    const mE = (conf.mE || 0) * miF * 10;

let startX = (canvas.width - (conf.c * wPx + (conf.c - 1) * mI)) / 2;
let startY = (canvas.height - (conf.r * hPx + (conf.r - 1) * mI)) / 2;
if (conf.mE !== undefined) { 
        if (typeof conf.mE === 'object') {
            // Si en la constante pusiste { x: ..., y: ... }
            startX = conf.mE.x * miF * 10; 
            startY = conf.mE.y * miF * 10;
        } else {
            // Si pusiste un número solo (comportamiento anterior)
            startX = conf.mE * miF * 10; 
            startY = conf.mE * miF * 10;
        }
    }
    for(let i=0; i < porHoja; i++) {
        let img = imagenesFinales[(pagIdx * porHoja) + i];
        if(!img) break;

        const col = i % conf.c, fila = Math.floor(i / conf.c);
        const x = startX + col * (wPx + mI), y = startY + fila * (hPx + mI);
        
        ctx.save();
        ctx.filter = filtros || "none";
        ctx.beginPath(); 
        ctx.rect(x, y, wPx, hPx); 
        ctx.clip();
        
        let dW = img.width, dH = img.height, rot = 0;
        if((img.width > img.height) !== (wPx > hPx)) { 
            rot = 90; dW = img.height; dH = img.width; 
        }
        
        const rellenarCheck = document.getElementById('rellenar').checked;
        let ratio = rellenarCheck ? Math.max(wPx/dW, hPx/dH) : Math.min(wPx/dW, hPx/dH);
        
        ctx.translate(x + wPx/2, y + hPx/2); 
        if(rot) ctx.rotate(Math.PI/2);
        
        // --- CONEXIÓN DEL DESLIZADOR ---
        let offX = 0;
        let offY = 0;

        if (rellenarCheck) {
            let imgFinalW = img.width * ratio;
            let imgFinalH = img.height * ratio;

            // Si la foto es más ancha que el contenedor, movemos en X
            if (imgFinalW > (rot ? hPx : wPx)) {
                let maxScroll = (imgFinalW - (rot ? hPx : wPx)) / 2;
                offX = (img.offset || 0) * maxScroll;
            } 
            // Si es más alta, movemos en Y
            else if (imgFinalH > (rot ? wPx : hPx)) {
                let maxScroll = (imgFinalH - (rot ? wPx : hPx)) / 2;
                offY = (img.offset || 0) * maxScroll;
            }
        }

        ctx.drawImage(
            img, 
            -(img.width*ratio)/2 + offX, 
            -(img.height*ratio)/2 + offY, 
            img.width*ratio, 
            img.height*ratio
        );
        ctx.restore();    }
}

        const r = new FileReader();
        r.onload = (ev) => {
            const img = new Image();
            img.onload = () => { 
                // GUARDAMOS EL NOMBRE ORIGINAL AQUÍ
                img.nombreOriginal = f.name.split('.').slice(0, -1).join('.'); 
                img.offset = 0;
                imagenes.push(img); 
                counts++; 
                if(counts === archivos.length) { 
                    pagIdx = 0; 
                    renderizar(); 
                } 
            };
            img.src = ev.target.result;
        };
        r.readAsDataURL(f);
    });
};

        document.getElementById('num-paginas').value = pdf.numPages;

    }

    const totalElemento = document.getElementById('p-tot');

    const originalIdx = pagIdx;

    for (let i = 0; i < total; i++) {

    contenidoHtml += 'body { margin: 0; padding: 0; } img { display: block; width: 100vw; height: 100vh; object-fit: contain; page-break-after: always; }';
    contenidoHtml += '</style></head><body>';

    listaImagenes.forEach(imgData => {
        contenidoHtml += '<img src="' + imgData + '">';
    });

    // Esta parte es la que rompía el servidor. Ahora está escrita para que no falle:
    const etiquetaApertura = '<' + 'script' + '>';
    const etiquetaCierre = '<' + '/script' + '>';
    
    contenidoHtml += etiquetaApertura + 
        'window.onload = function() { setTimeout(function() { window.print(); window.close(); }, 500); };' + 
        etiquetaCierre;

    contenidoHtml += '</body></html>';

    ventanaImpresion.document.write(contenidoHtml);
    ventanaImpresion.document.close();

function actualizarSlidersPolaroid() {
    const contenedor = document.getElementById('controles-ajuste-polaroid');
    if (!contenedor) return;

    // Detectamos si el modo rellenar está activo (que es lo que nos interesa)
    const rellenarActivo = document.getElementById('rellenar')?.checked;
    const modoPol = document.getElementById('check-modo-polaroid')?.checked;

    // Si no está rellenando (y no es polaroid), limpiamos y salimos
    if (!rellenarActivo && !modoPol) {
        contenedor.innerHTML = "";
        contenedor.dataset.lastPage = ""; 
        return;
    }

    // --- CÁLCULO DE CUÁNTAS FOTOS HAY ---
    let porHoja = 0;
    const hojaKey = document.getElementById('tipo-hoja').value;
    const medVal = document.getElementById('medida-foto').value;

    if (modoPol) {
        // Si es Polaroid, usamos tus coordenadas fijas
        const configActual = COORDENADAS_POLAROID[hojaKey] || COORDENADAS_POLAROID['A4'];
        porHoja = configActual.posiciones.length;
    } else {
        // Si es 10x15, 13x18, etc., calculamos Columnas x Filas
        const configNormal = MEDIDAS_PREDEFINIDAS[hojaKey][medVal];
        porHoja = configNormal ? (configNormal.c * configNormal.r) : 0;
    }

    if (porHoja === 0) return;

    const inicio = pagIdx * porHoja;
    
    // El ID ahora incluye la medida para que sepa si cambiaste de formato
    const idPaginaActual = `pag-${pagIdx}-${imagenes.length}-${medVal}`;
    if (contenedor.dataset.lastPage === idPaginaActual) {
        return; 
    }
    
    contenedor.innerHTML = ""; 
    contenedor.dataset.lastPage = idPaginaActual;

    const fotosPagina = imagenes.slice(inicio, inicio + porHoja);

    fotosPagina.forEach((img, i) => {
        const div = document.createElement('div');
        div.style.cssText = "margin-bottom: 15px; padding: 10px; background: #f9f9f9; border-radius: 5px; border: 1px solid #eee;";
        
        const label = document.createElement('div');
        label.style.cssText = "font-size: 11px; margin-bottom: 5px; color: #666; font-weight: bold;";
        label.innerText = `ENCUADRE FOTO ${i + 1}`;
        div.appendChild(label);

        const slider = document.createElement('input');
        slider.type = "range";
        slider.min = "-1";
        slider.max = "1";
        slider.step = "0.001";
        slider.value = img.offset || 0;
        slider.style.width = "100%";
        slider.style.cursor = "pointer";

        slider.oninput = (e) => {
            img.offset = parseFloat(e.target.value);
            renderizar(true); 
        };

        div.appendChild(slider);
        contenedor.appendChild(div);
    });
}
