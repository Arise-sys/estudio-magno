<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTUDIO MAGNO | Producción</title>
    <style>
        :root { --fuente-mono: "SFMono-Regular", Consolas, monospace; }
body { 
    margin: 0; 
    padding: 0; 
    background-color: #ffffff; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    
    /* BLOQUEO DE ANCHO PARA EVITAR SALTOS */
    overflow-y: scroll; 
    overflow-x: hidden; 
    width: 100vw; 

    font-family: sans-serif;
    background-image: linear-gradient(rgba(230, 230, 230, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(230, 230, 230, 0.5) 1px, transparent 1px); 
    background-size: 30px 30px; 
}
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: white; border-bottom: 2px solid #000; z-index: 10; font-family: var(--fuente-mono); }
        
        /* Ajuste vital para la marquesina */
.contenedor-bucle { 
    width: 100%; 
    background: #000; 
    overflow: hidden; 
    padding: 10px 0; 
    display: flex; 
    flex-shrink: 0; /* Esto impide que la marquesina se aplaste */
}
        .texto-movil { display: flex; animation: desplaza 30s linear infinite; font-family: var(--fuente-mono); color: #fff; text-transform: uppercase; white-space: nowrap; }
        @keyframes desplaza { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Navegación por Pestañas */
        /* Navegación por Pestañas */
        nav { display: flex; justify-content: center; background: none; border-bottom: none; }
        .tab-btn { padding: 15px 30px; border: none; background: none; cursor: pointer; font-family: var(--fuente-mono); font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .tab-btn:hover { background: #e0e0e0; }
        .tab-btn.active { background: #000; color: #fff; }

        main { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    align-items: center; /* Centrado respecto al body fijo */
    width: 100%;
    overflow-y: visible; 
}
        
/* Contenedores de Secciones (Volver al centrado normal) */
.seccion { 
    display: none; 
    width: 100%; 
    justify-content: center; 
    align-items: flex-start; 
}

.seccion.active { 
    display: flex; 
}

.panel { 
    background: #fff; 
    padding: 25px; 
    border: 2px solid #000; 
    width: 450px; 
    box-shadow: 10px 10px 0 #e0e0e0; 
    font-family: var(--fuente-mono);
    margin-top: 20px;
}
        h3 { border-bottom: 3px solid #000; padding-bottom: 5px; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select, input[type="number"], input[type="file"] { width: 100%; padding: 8px; margin-bottom: 15px; border: 2px solid #000; box-sizing: border-box; font-family: var(--fuente-mono); }
        
        /* Estilos Calculadora */
        .resultado-calc { background: #000; color: #fff; padding: 15px; margin-top: 15px; }
        .linea-res { display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* Estilos Fotos */
        #canvas-preview { border: 1px solid #000; width: 100%; background: #f0f0f0; margin-top: 10px; }
        .btn-magno { background: #000; color: #fff; padding: 12px; border: none; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 10px; font-family: var(--fuente-mono); }
        .controles-pag { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        
        /* Estilo para el contenedor del input de archivo "fake" */
        .fake-input-container {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<header>
    <div><strong>ESTUDIO MAGNO</strong></div>
    <div id="fecha"></div>
</header>

<div class="contenedor-bucle">
    <div class="texto-movil" id="marquesina"></div>
</div>

<nav>
    <button class="tab-btn active" onclick="cambiarTab('cotizacion', this)">Sistema de Cotización</button>
    <button class="tab-btn" onclick="cambiarTab('fotos', this)">Armado de Foto</button>
</nav>

<main>
    <div id="seccion-cotizacion" class="seccion active">
        <div class="panel">
            <h3>SISTEMA DE COTIZACIÓN</h3>
            <label>CARGAR PDF:</label>
            <div style="position: relative; margin-bottom: 15px;">
            <button type="button" class="btn-magno" id="btn-pdf-fake" style="margin-top: 0; width: 100%;">SELECCIONAR ARCHIVO PDF</button>
            <span id="pdf-status" style="display: block; font-size: 0.9rem; margin-top: 5px; color: #666; font-family: var(--fuente-mono);">Sin archivo seleccionado</span>
            <input type="file" id="subir-pdf" accept="application/pdf" style="display: none;">
            </div>
            
            <label>PÁGINAS DEL ARCHIVO:</label>
            <input type="number" id="num-paginas" value="0">

            <div style="border: 2px solid #000; padding: 10px; margin-bottom: 15px; display: flex; justify-content: space-around;">
                <label><input type="radio" name="tipo-faz" value="simple" checked onchange="calcular()"> SIMPLE FAZ</label>
                <label><input type="radio" name="tipo-faz" value="doble" onchange="calcular()"> DOBLE FAZ</label>
            </div>

            <div style="border: 2px solid #000; padding: 10px; margin-bottom: 15px;">
                <label style="cursor:pointer;"><input type="checkbox" id="con-anillado" onchange="calcular()"> ¿SOLICITAR ANILLADO?</label>
            </div>

            <div class="resultado-calc">
                <div class="linea-res">HOJAS FÍSICAS: <span id="total-hojas">0</span></div>
                <div class="linea-res">PRECIO X HOJA: $<span id="precio-unidad">0</span></div>
                <div class="linea-res">ANILLADO: $<span id="precio-anillado">0</span></div>
                <hr style="border: 1px solid #fff;">
                <div class="linea-res" style="font-size: 1.2rem; font-weight: bold;">TOTAL: $<span id="total-precio">0</span></div>
            </div>
        </div>
    </div>

    <div id="seccion-fotos" class="seccion">
        <div class="panel">
            <h3>ARMADO DE FOTOS</h3>

            <label>CARGAR JPG / PNG:</label>
            <div class="fake-input-container" style="position: relative;">
                <button type="button" class="btn-magno" id="btn-fotos-fake" style="margin-top: 0;">SELECCIONAR IMÁGENES</button>
                <span id="fotos-status" style="display: block; font-size: 0.9rem; margin-top: 5px; color: #666;">Sin archivos seleccionados</span>
                <input type="file" id="fotos-input" accept="image/*" multiple style="display: none;">
            </div>

            <label>TIPO DE HOJA:</label>
            <select id="tipo-hoja" onchange="cambiarConfig()">
                <option value="A4">A4 (21 x 29.7 cm)</option>
                <option value="A6">A6 (10.5 x 14.8 cm)</option>
            </select>
            
            <label>MEDIDA FOTO:</label>
            <select id="medida-foto" onchange="renderizar()"></select>
            
            <label style="margin: 10px 0; cursor:pointer; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="rellenar" onchange="renderizar()"> RELLENAR ESPACIO (SIN BORDES)
            </label>

            <div class="controles-pag">
                <button class="btn-magno" style="width: 40px;" onclick="pagAnt()">◀</button>
                <span>PÁG <span id="p-act">1</span> / <span id="p-tot">1</span></span>
                <button class="btn-magno" style="width: 40px;" onclick="pagSig()">▶</button>
            </div>

            <canvas id="canvas-preview"></canvas>
            <button class="btn-magno" onclick="descargar()">DESCARGAR HOJA</button>
        </div>
    </div>
</main>

<script>
    // --- LÓGICA GENERAL UI ---
    document.getElementById('fecha').textContent = new Date().toLocaleDateString();
    document.getElementById('marquesina').innerHTML = `<span>ORDEN — PRODUCCIÓN — ESTUDIO MAGNO — </span>`.repeat(10);

    function cambiarTab(id, btn) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`seccion-${id}`).classList.add('active');
        btn.classList.add('active');
        if(id === 'fotos') renderizar(); // Refrescar canvas al entrar
    }

    // --- LÓGICA COTIZADOR ---
    const inputManual = document.getElementById('num-paginas');
    const checkAnillado = document.getElementById('con-anillado');

    function calcular() {
        const paginasOriginales = parseInt(inputManual.value) || 0;
        const esDobleFaz = document.querySelector('input[name="tipo-faz"]:checked').value === 'doble';
        let hojasFisicas = esDobleFaz ? Math.ceil(paginasOriginales / 2) : paginasOriginales;
        let precioPorHoja = 0;

        // Escalas de precios originales
        if (!esDobleFaz) {
            if (hojasFisicas <= 100) precioPorHoja = 100;
            else if (hojasFisicas <= 300) precioPorHoja = 90;
            else precioPorHoja = 80;
        } else {
            if (hojasFisicas <= 100) precioPorHoja = 150; 
            else if (hojasFisicas <= 300) precioPorHoja = 140;
            else precioPorHoja = 130; 
        }

        let costoAnillado = 0;
        if (checkAnillado.checked && hojasFisicas > 0) {
            if (hojasFisicas <= 50) costoAnillado = 1200;
            else if (hojasFisicas <= 150) costoAnillado = 2000;
            else if (hojasFisicas <= 300) costoAnillado = 2700;
            else costoAnillado = 3500;
        }

        document.getElementById('total-hojas').textContent = hojasFisicas;
        document.getElementById('precio-unidad').textContent = precioPorHoja;
        document.getElementById('precio-anillado').textContent = costoAnillado;
        document.getElementById('total-precio').textContent = ((hojasFisicas * precioPorHoja) + costoAnillado).toLocaleString('es-AR');
    }

    inputManual.addEventListener('input', calcular);

    document.getElementById('btn-pdf-fake').addEventListener('click', () => {
        document.getElementById('subir-pdf').click();
    });

    document.getElementById('subir-pdf').addEventListener('change', async (e) => {
        const status = document.getElementById('pdf-status');
        const file = e.target.files[0];

        if (file) {
            status.textContent = file.name;
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                inputManual.value = pdf.numPages;
                calcular();
            };
            reader.readAsArrayBuffer(file);
        } else {
            status.textContent = "Sin archivo seleccionado";
        }
    });

    // --- LÓGICA ARMADO DE IMÁGENES ---
    const MEDIDAS = {
        "A4": [
            // n: Nombre, w: Ancho(cm), h: Alto(cm), 
            // c: Columnas, r: Filas, mI: Gap(cm), mE: Margen(cm)
            { n: "13x18 cm (2 por hoja)", w: 18, h: 13, c: 1, r: 2, mI: 0.5 }, 
            { n: "10x15 cm (2 por hoja)", w: 15, h: 10, c: 1, r: 2, mI: 2 },
            { n: "9x13 cm (4 por hoja)", w: 9, h: 13, c: 2, r: 2, mI: 0.5 },
            { n: "20x25 cm (1 por hoja)", w: 20, h: 25, c: 1, r: 1 },
            { n: "Tiras 9x20 cm (3 por hoja)", w: 20, h: 9, c: 1, r: 3 },
            { n: "6 fotos personalizadas (2x3)", w: 9, h: 9.2, c: 2, r: 3,},
            { n: "2 fotos (Máximo 5mm Margen)", w: 20, h: 14.1, c: 1, r: 2, mE: 0.5, mI: 0.5 }, 
            { n: "4 fotos (Máximo 5mm Margen)", w: 10, h: 14.35, c: 2, r: 2, mE: 0.5, mI: 0.5  }
        ],
        "A6": [{ n: "Carnet 4x4 cm (6 por hoja)", w: 4, h: 4, c: 2, r: 3 }]
    };

    let imagenes = [];
    let pagIdx = 0;
    const canvas = document.getElementById('canvas-preview');
    const ctx = canvas.getContext('2d');

    // Vincular clic del botón "fake" al input real
    const btnFakeFotos = document.getElementById('btn-fotos-fake');
    const inputRealFotos = document.getElementById('fotos-input');
    const statusFotos = document.getElementById('fotos-status');

    btnFakeFotos.addEventListener('click', () => {
        inputRealFotos.click();
    });

    function cambiarConfig() {
        const h = document.getElementById('tipo-hoja').value;
        const sel = document.getElementById('medida-foto');
        sel.innerHTML = MEDIDAS[h].map((m, i) => `<option value="${i}">${m.n}</option>`).join('');
        pagIdx = 0;
        renderizar();
    }

    // Actualizar lógica de carga para usar el nuevo input y mostrar estado
    inputRealFotos.addEventListener('change', (e) => {
        const archivos = Array.from(e.target.files);
        
        // Actualizar el estado visual
        if (archivos.length === 0) {
            statusFotos.textContent = "Sin archivos seleccionados";
        } else if (archivos.length === 1) {
            statusFotos.textContent = "1 archivo seleccionado";
        } else {
            statusFotos.textContent = `${archivos.length} archivos seleccionados`;
        }

        // Ejecutar la lógica de carga original
        imagenes = [];
        let counts = 0;
        if(archivos.length === 0) return;
        archivos.forEach(f => {
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image();
                img.onload = () => { imagenes.push(img); counts++; if(counts === archivos.length) { pagIdx = 0; renderizar(); } };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        });
    });

function renderizar() {
    const hoja = document.getElementById('tipo-hoja').value;
    const config = MEDIDAS[hoja][document.getElementById('medida-foto').value];
    const fill = document.getElementById('rellenar').checked;
    
    // --- ESTAS LÍNEAS SE HABÍAN PERDIDO Y SON VITALES ---
    // Definimos el tamaño del lienzo según el tipo de hoja
    canvas.width = (hoja === 'A4') ? 2480 : 1240; 
    canvas.height = (hoja === 'A4') ? 3508 : 1748;
    
    // Limpiamos el fondo (blanco)
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // ---------------------------------------------------

    const f = 118.11; // Factor de conversión cm a píxeles (300 DPI)

    // LÓGICA DE MÁRGENES DINÁMICOS:
    const gap = config.mI ? (config.mI * f) : 40;

    const porHoja = config.c * config.r;
    document.getElementById('p-tot').textContent = Math.ceil(imagenes.length / porHoja) || 1;
    document.getElementById('p-act').textContent = pagIdx + 1;

    if (imagenes.length === 0) return;

    const gridW = (config.c * config.w * f) + (config.c - 1) * gap;
    const gridH = (config.r * config.h * f) + (config.r - 1) * gap;

    // Si tiene mE (Margen Externo), lo usa. Si no, centra.
    const startX = config.mE ? (config.mE * f) : (canvas.width - gridW) / 2;
    const startY = config.mE ? (config.mE * f) : (canvas.height - gridH) / 2;

    for(let i=0; i < porHoja; i++) {
        let imgIdx = (pagIdx * porHoja) + i;
        let img = imagenes[imgIdx];
        if(!img) break;

        const x = startX + (i % config.c) * (config.w * f + gap);
        const y = startY + Math.floor(i / config.c) * (config.h * f + gap);
        const tw = config.w * f;
        const th = config.h * f;

        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, tw, th);
        ctx.clip();

        let drawW = img.width, drawH = img.height, rotation = 0;
        // Auto-rotación inteligente si la orientación no coincide
        if ((img.width > img.height) !== (tw > th)) {
            rotation = 90; drawW = img.height; drawH = img.width;
        }

        let ratio = fill ? Math.max(tw / drawW, th / drawH) : Math.min(tw / drawW, th / drawH);
        ctx.translate(x + tw/2, y + th/2);
        if(rotation !== 0) ctx.rotate(Math.PI / 2);
        ctx.drawImage(img, -(img.width * ratio)/2, -(img.height * ratio)/2, img.width * ratio, img.height * ratio);
        ctx.restore();

        /* Borde guía para el corte
        ctx.strokeStyle = "#ccc";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, tw, th);
        */
    }
}

    function pagAnt() { if(pagIdx > 0) { pagIdx--; renderizar(); } }
    function pagSig() { 
        const h = document.getElementById('tipo-hoja').value;
        const c = MEDIDAS[h][document.getElementById('medida-foto').value];
        if(pagIdx < Math.ceil(imagenes.length / (c.c*c.r)) - 1) { pagIdx++; renderizar(); } 
    }

    function descargar() {
        const a = document.createElement('a');
        a.download = `MAGNO_FOTO_PAG_${pagIdx+1}.jpg`;
        a.href = canvas.toDataURL("image/jpeg", 0.9);
        a.click();
    }

    cambiarConfig();
</script>
</body>
</html>
